contract_version: 1.0.0
contract_name: mara_enterprise_contract
description: Enterprise data contract for SAP MARA material master table generated from uploaded MARA extract.
owner:
  team: data_engineering
  business_owner: material_master
  technical_owner: databricks_pipeline
sla:
  refresh: daily
  criticality: High
business_domain: SAP MM
table:
  name: MARA
  domain: SAP Material Master
  primary_key:
  - MANDT
  - MATNR
source:
  catalog: workspace
  schema: sap_bronze
  table: MARA
target:
  catalog: workspace
  schema: sap_gold
  table: MARA_DP_NEW
schema_enforcement:
  expected_field_count: 296
  allow_extra_columns: false
  allow_missing_columns: false
  enforce_column_order: true
  case_sensitive_columns: true
quality_rules:
  fail_on_error: true
  checks:
  - name: field_count_check
    type: schema
    severity: error
    description: Actual field count must equal expected_field_count.
  - name: required_columns_check
    type: schema
    severity: error
    description: All columns listed in this contract must be present.
  - name: no_extra_columns_check
    type: schema
    severity: error
    description: Source table must not contain columns outside this contract.
  - name: primary_key_not_null
    type: completeness
    severity: error
    columns:
    - MANDT
    - MATNR
  - name: created_date_not_null
    type: completeness
    severity: error
    columns:
    - ERSDA
  - name: date_format_check
    type: format
    severity: error
    columns:
    - DATAB
    - ERSDA
    - LAEDA
    - LIQDT
    - MSTDE
    - MSTDV
    format: yyyyMMdd
  - name: primary_key_uniqueness
    type: uniqueness
    severity: error
    columns:
    - MANDT
    - MATNR
date_rules:
  DATAB: yyyyMMdd
  ERSDA: yyyyMMdd
  LAEDA: yyyyMMdd
  LIQDT: yyyyMMdd
  MSTDE: yyyyMMdd
  MSTDV: yyyyMMdd
